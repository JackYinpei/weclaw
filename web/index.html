<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw Manager</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        :root {
            --bg-color: #0f172a;
            --surface-color: rgba(30, 41, 59, 0.7);
            --surface-border: rgba(255, 255, 255, 0.1);
            --primary-color: #3b82f6;
            --primary-hover: #2563eb;
            --success-color: #10b981;
            --danger-color: #ef4444;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,0.2) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(339,49%,30%,0.2) 0, transparent 50%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 2rem 5%;
            border-bottom: 1px solid var(--surface-border);
            background: rgba(15, 23, 42, 0.5);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        main {
            flex: 1;
            padding: 2rem 5%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        .glass-card {
            background: var(--surface-color);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--surface-border);
            border-radius: 16px;
            padding: 1.5rem;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .glass-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: 500;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
            font-size: 0.875rem;
        }

        input {
            width: 100%;
            padding: 0.75rem 1rem;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--surface-border);
            border-radius: 8px;
            color: var(--text-main);
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s ease;
        }

        input:focus {
            border-color: var(--primary-color);
        }

        button {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.1s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            width: 100%;
        }

        button:hover {
            background: var(--primary-hover);
        }

        button:active {
            transform: scale(0.98);
        }

        button.danger {
            background: var(--danger-color);
        }

        button.danger:hover {
            background: #dc2626;
        }

        .btn-group {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
        }

        .status-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-active {
            background: rgba(16, 185, 129, 0.2);
            color: var(--success-color);
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .status-offline {
            background: rgba(239, 68, 68, 0.2);
            color: var(--danger-color);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1rem;
            margin-top: 1rem;
            margin-bottom: 1.5rem;
        }

        .info-item {
            background: rgba(0, 0, 0, 0.2);
            padding: 1rem;
            border-radius: 8px;
            border: 1px solid var(--surface-border);
        }

        .info-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 0.25rem;
        }

        .info-value {
            font-size: 0.875rem;
            word-break: break-all;
            font-family: monospace;
        }

        .chat-container {
            display: flex;
            flex-direction: column;
            height: 500px;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            border: 1px solid var(--surface-border);
            margin-bottom: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .message {
            max-width: 80%;
            padding: 0.75rem 1rem;
            border-radius: 12px;
            font-size: 0.875rem;
            line-height: 1.5;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            background: var(--primary-color);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.ai {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-main);
            border-bottom-left-radius: 4px;
        }

        .chat-input-area {
            display: flex;
            gap: 0.5rem;
        }

        .chat-input-area input {
            flex: 1;
        }

        .chat-input-area button {
            width: auto;
            padding: 0 1.5rem;
        }

        #loader {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 1rem 1.5rem;
            background: var(--surface-color);
            backdrop-filter: blur(10px);
            border: 1px solid var(--surface-border);
            border-radius: 8px;
            color: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 1000;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .toast.error {
            border-left: 4px solid var(--danger-color);
        }

        .toast.success {
            border-left: 4px solid var(--success-color);
        }

        @media (max-width: 768px) {
            main {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>WeClaw / OpenClaw Dashboard</h1>
        <div>
            <span style="color: var(--text-muted); font-size: 0.875rem;">Container Manager Interface</span>
        </div>
    </header>

    <main>
        <!-- Left Column: User & Container Management -->
        <div class="glass-card">
            <h2 class="card-title">🔌 Connection & Container</h2>
            
            <div class="form-group">
                <label for="openidInput">User OpenID (Unique Identifier)</label>
                <input type="text" id="openidInput" placeholder="e.g. user-123" value="demo-user-1">
            </div>

            <div class="btn-group">
                <button onclick="createContainer()" id="createBtn">
                    <span id="createBtnText">Create / Register</span>
                    <div id="loader"></div>
                </button>
                <button onclick="checkStatus()" style="background: rgba(255,255,255,0.1);">Refresh Status</button>
            </div>

            <div class="info-grid" id="statusGrid" style="display: none;">
                <div class="info-item">
                    <div class="info-label">Current Status</div>
                    <div class="status-badge status-offline" id="statusBadge">Checking...</div>
                </div>
                <div class="info-item">
                    <div class="info-label">Container ID</div>
                    <div class="info-value" id="containerId">-</div>
                </div>
                <div class="info-item">
                    <div class="info-label">Port Map</div>
                    <div class="info-value" id="containerPort">-</div>
                </div>
            </div>

            <button onclick="deleteContainer()" class="danger" id="deleteBtn" style="display: none; margin-top: 1rem;">
                Delete Container
            </button>
        </div>

        <!-- Right Column: Chat Interface -->
        <div class="glass-card">
            <h2 class="card-title">💬 API Test Chat</h2>
            
            <div class="chat-container">
                <div class="chat-messages" id="chatBox">
                    <div class="message ai">Welcome! Register a user to start testing the OpenClaw API container.</div>
                </div>
                
                <div class="chat-input-area">
                    <input type="text" id="messageInput" placeholder="Type a message to send..." onkeypress="if(event.key === 'Enter') sendMessage()">
                    <button onclick="sendMessage()" id="sendBtn">Send</button>
                </div>
            </div>
        </div>
    </main>

    <div id="toast" class="toast">Notification Message</div>

    <script>
        const API_BASE = 'http://localhost:8080/api/test';
        let currentUser = null;

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast show ' + type;
            setTimeout(() => {
                toast.className = 'toast';
            }, 3000);
        }

        function appendMessage(text, sender) {
            const chatBox = document.getElementById('chatBox');
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${sender}`;
            msgDiv.innerText = text;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function setLoading(btnId, isLoad) {
            const btn = document.getElementById(btnId);
            if (!btn) return;
            if (isLoad) {
                btn.style.opacity = '0.7';
                btn.style.pointerEvents = 'none';
            } else {
                btn.style.opacity = '1';
                btn.style.pointerEvents = 'auto';
            }
        }

        async function createContainer() {
            const openid = document.getElementById('openidInput').value.trim();
            if(!openid) return showToast('Please enter an OpenID', 'error');

            setLoading('createBtn', true);
            const loader = document.getElementById('loader');
            const btnText = document.getElementById('createBtnText');
            loader.style.display = 'block';
            btnText.style.display = 'none';

            try {
                const res = await fetch(`${API_BASE}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ openid })
                });
                const data = await res.json();
                
                if (res.ok && (data.status === 'OK' || data.status === 'already_exists')) {
                    showToast(data.message || 'Container ready!');
                    currentUser = openid;
                    await checkStatus();
                } else {
                    showToast(data.error || 'Failed to create container', 'error');
                }
            } catch (err) {
                showToast(err.message, 'error');
            } finally {
                setLoading('createBtn', false);
                loader.style.display = 'none';
                btnText.style.display = 'block';
            }
        }

        async function checkStatus() {
            const openid = currentUser || document.getElementById('openidInput').value.trim();
            if(!openid) return;

            try {
                const res = await fetch(`${API_BASE}/user/${openid}`);
                if (!res.ok) {
                    document.getElementById('statusGrid').style.display = 'none';
                    document.getElementById('deleteBtn').style.display = 'none';
                    return;
                }
                const data = await res.json();
                
                document.getElementById('statusGrid').style.display = 'grid';
                document.getElementById('deleteBtn').style.display = 'block';

                const badge = document.getElementById('statusBadge');
                if (data.container_running) {
                    badge.textContent = 'Running';
                    badge.className = 'status-badge status-active';
                } else {
                    badge.textContent = data.user.status || 'Offline';
                    badge.className = 'status-badge status-offline';
                }

                document.getElementById('containerId').textContent = data.user.container_id ? data.user.container_id.substring(0, 12) : 'None';
                document.getElementById('containerPort').textContent = data.user.container_port || 'None';
                currentUser = openid;
            } catch (err) {
                console.error(err);
            }
        }

        async function deleteContainer() {
            if(!currentUser) return;
            
            if(!confirm(`Are you sure you want to delete container for ${currentUser}?`)) return;

            try {
                const res = await fetch(`${API_BASE}/user/${currentUser}`, {
                    method: 'DELETE'
                });
                if (res.ok) {
                    showToast('Container deleted');
                    document.getElementById('statusGrid').style.display = 'none';
                    document.getElementById('deleteBtn').style.display = 'none';
                    currentUser = null;
                }
            } catch(err) {
                showToast(err.message, 'error');
            }
        }

        async function sendMessage() {
            const openid = document.getElementById('openidInput').value.trim();
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            
            if(!openid) return showToast('Please set OpenID and create container first', 'error');
            if(!text) return;

            appendMessage(text, 'user');
            input.value = '';
            setLoading('sendBtn', true);
            const sendBtn = document.getElementById('sendBtn');
            const originalText = sendBtn.innerText;
            sendBtn.innerText = '...';

            try {
                const res = await fetch(`${API_BASE}/send`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ openid, message: text })
                });
                const data = await res.json();
                
                if (res.ok && data.status === 'OK') {
                    // Check if raw_response is empty or just brackets
                    const resp = data.raw_response;
                    if (!resp || resp.trim() === '' || resp.includes('[无响应内容]')) {
                         appendMessage('⚠️ OpenClaw returned empty response. (Raw: ' + resp + ')', 'ai');
                    } else {
                         appendMessage(resp, 'ai');
                    }
                } else {
                    appendMessage(`Error: ${data.error || 'Request failed'}`, 'ai');
                }
            } catch(err) {
                appendMessage(`Network Error: ${err.message}`, 'ai');
            } finally {
                setLoading('sendBtn', false);
                sendBtn.innerText = originalText;
            }
        }
    </script>
</body>
</html>

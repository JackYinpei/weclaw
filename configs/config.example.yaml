# WeClaw 配置文件
server:
  port: 8080
  host: "0.0.0.0"

docker:
  max_containers: 20
  port_range_start: 9001
  port_range_end: 9100
  idle_timeout_minutes: 30
  memory_limit: "2g"
  cpu_limit: "1.0"
  network_name: "weclaw-net"
  openclaw_image: "ghcr.io/openclaw/openclaw:latest"
  # 宿主机目录，每个容器的 ~/.openclaw 会挂载到 {openclaw_host_data_dir}/{容器名}；Linux 下若遇 EACCES 可将该目录 chown 1000:1000
  openclaw_host_data_dir: "./data/weclaw-openclaw"

openclaw:
  api_key: "xyz"
  base_url: "https://api-ai.gitcode.com/v1"
  model_provider: "openai"
  model_name: "zai-org/GLM-5"
  tools_profile: "full"
  # Web 搜索配置（可选）- 对应 openclaw.json 中的 tools.web.search
  # 支持 Brave、Gemini、Grok、Kimi、Perplexity 等搜索引擎
  # 下面以 Kimi 为例，API Key 从 https://platform.moonshot.cn 获取
  web_search:
    enabled: false
    max_results: 5
    timeout_seconds: 30
    cache_ttl_minutes: 15
    kimi:
      api_key: "your-kimi-api-key"
  # MCP 联网搜索配置（推荐）- 通过 mcporter + 阿里云百炼 WebSearch MCP 实现
  # API Key 从阿里云百炼控制台获取
  # 启用后自动：1) 安装 mcporter CLI  2) 写入 ~/.mcporter/mcporter.json  3) 启用 mcporter skill
  # server_name 和 base_url 有默认值（阿里云 WebSearch），一般只需配置 api_key
  mcp_search:
    enabled: true
    api_key: "sk-your-dashscope-api-key"
    # server_name: "WebSearch"  # 默认 WebSearch
    # base_url: "https://dashscope.aliyuncs.com/api/v1/mcps/WebSearch/mcp"  # 默认阿里云

knowledge_base:
  host_dir: "./data/shared-knowledge"
  container_mount: "/home/node/shared-knowledge"

database:
  driver: "sqlite"
  dsn: "./data/weclaw.db"
